<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专利检索内部控制台</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --primary: #409eff;
            --primary-hover: #66b1ff;
            --danger: #f56c6c;
            --success: #67c23a;
            --warning: #e6a23c;
            --text: #303133;
            --text-secondary: #606266;
            --border: #dcdfe6;
            --bg: #f5f7fa;
            --card-bg: #fff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        :focus-visible {
            outline: 3px solid rgba(64, 158, 255, 0.4);
            outline-offset: 2px;
        }
        .console-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 24px;
            background: #172033;
            color: #fff;
        }
        .console-topbar h1 { margin: 0; font-size: 18px; }
        .console-topbar p { margin: 3px 0 0; color: #cbd5e1; font-size: 12px; }
        /* 检索区 */
        .search-panel {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 20px 24px;
        }
        .search-form { max-width: 1200px; margin: 0 auto; }
        .search-label { display: block; margin-bottom: 7px; font-size: 13px; font-weight: 600; }
        .search-entry { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: end; }
        .search-entry textarea { min-height: 68px; resize: vertical; }
        .search-actions { display: flex; gap: 8px; align-items: center; }
        .search-actions .primary { min-width: 92px; min-height: 42px; }
        .query-status { min-height: 22px; margin: 10px 0 0; font-size: 13px; color: var(--text-secondary); }
        .query-status.error { color: #b42318; }
        .query-status.success { color: #067647; }
        .query-status.loading { color: #175cd3; }
        .advanced-toggle { margin-top: 14px; padding: 0; border: 0; background: transparent; color: #175cd3; font-weight: 600; }
        .advanced-panel { margin-top: 12px; padding-top: 16px; border-top: 1px solid var(--border); }
        .advanced-panel[hidden] { display: none; }
        button {
            padding: 8px 18px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #fff;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
        }
        button:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        button.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        button.primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
        }
        button.small {
            padding: 5px 10px;
            font-size: 12px;
        }
        button.icon {
            width: 28px;
            height: 28px;
            padding: 0;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            line-height: 1;
        }
        button.icon.add {
            border-color: var(--primary);
            color: var(--primary);
        }
        button.icon.add:hover {
            background: var(--primary);
            color: #fff;
        }
        button.icon.remove {
            border-color: var(--danger);
            color: var(--danger);
        }
        button.icon.remove:hover {
            background: var(--danger);
            color: #fff;
        }

        .request-params {
            display: grid;
            grid-template-columns: repeat(5, minmax(120px, 1fr));
            gap: 10px;
            padding: 10px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .request-param label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        input, select, textarea {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        textarea {
            resize: vertical;
        }
        .hint {
            font-size: 12px;
            color: #909399;
            margin-top: 4px;
        }

        .query-workbench {
            display: grid;
            grid-template-columns: minmax(320px, 1.4fr) minmax(420px, 1fr);
            gap: 12px;
            align-items: start;
            margin-bottom: 12px;
        }
        .query-editor {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            background: #f8fafc;
        }
        .query-editor label,
        .builder-label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .query-editor textarea {
            background: #fff;
            min-height: 92px;
            margin-bottom: 8px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            line-height: 1.5;
        }
        .query-toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .query-toolbar button {
            padding: 5px 12px;
            font-size: 12px;
        }
        .builder-panel {
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            padding: 12px;
        }
        .builder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .builder-header h2 {
            margin: 0;
            font-size: 14px;
            color: var(--text);
        }
        .builder-toolbar,
        .builder-group-actions,
        .builder-node-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .builder-toolbar {
            margin-bottom: 10px;
        }
        .builder-tree {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
        }
        .builder-group {
            border: 1px solid #cfd8e3;
            border-left: 1px solid var(--primary);
            border-radius: 6px;
            padding: 10px;
            background: #fbfdff;
        }
        .builder-group.depth-1 { border-left-color: var(--success); }
        .builder-group.depth-2 { border-left-color: var(--warning); }
        .builder-group.depth-3 { border-left-color: #8b5cf6; }
        .builder-group-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .builder-children {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .builder-node {
            display: grid;
            grid-template-columns: 112px minmax(150px, 190px) 168px minmax(180px, 1fr) 76px;
            gap: 8px;
            align-items: end;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            background: #fff;
        }
        .builder-node.group-node {
            grid-template-columns: 112px minmax(220px, 1fr) 76px;
            background: #f6fbff;
        }
        .builder-node label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .builder-value-pair {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 8px;
        }
        .builder-value textarea {
            min-height: 64px;
        }
        .builder-preview {
            margin-top: 10px;
            padding: 10px;
            border: 1px dashed #bfd0e4;
            border-radius: 6px;
            background: #f8fafc;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .builder-error {
            margin-bottom: 10px;
        }

        /* 结果区 */
        .results-panel {
            display: block;
            background: var(--bg);
        }
        .results-header {
            padding: 10px 24px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-secondary);
        }
        .results-header strong {
            color: var(--primary);
            font-size: 14px;
        }
        .results-list {
            padding: 16px 24px;
        }
        .record {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .record:hover, .record.active {
            border-color: var(--primary);
            box-shadow: 0 3px 10px rgba(15, 23, 42, 0.12);
        }
        .record-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .record-meta {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .record-meta span {
            margin-right: 16px;
        }
        .record-abstract {
            margin-top: 8px;
            font-size: 12px;
            color: #555;
            line-height: 1.5;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .record-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }
        .pagination {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* 请求/错误区 */
        .request-panel {
            background: var(--card-bg);
            border-top: 1px solid var(--border);
        }
        .request-header {
            padding: 8px 24px;
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .request-header:hover {
            background: #f5f7fa;
        }
        .request-body {
            padding: 0 24px 16px;
            max-height: 180px;
            overflow: auto;
        }
        .request-body.collapsed {
            display: none;
        }
        .request-body pre {
            margin: 0;
            background: #f8f8f8;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* 详情抽屉 */
        .detail-overlay {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: min(720px, 100vw);
            background: var(--card-bg);
            border-left: 1px solid var(--border);
            box-shadow: -4px 0 16px rgba(0,0,0,0.1);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.2s;
        }
        .detail-overlay.open {
            transform: translateX(0);
        }
        .detail-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .detail-header h3 {
            margin: 0;
            font-size: 16px;
        }
        .detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }
        .detail-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .detail-summary {
            background: #f0f9ff;
            border-left: 1px solid var(--primary);
            padding: 10px 12px;
            margin-bottom: 14px;
            border-radius: 4px;
            font-size: 13px;
        }
        .detail-section {
            margin-bottom: 18px;
        }
        .detail-section h4 {
            margin: 0 0 8px;
            font-size: 13px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }
        .detail-row {
            display: flex;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .detail-label {
            width: 100px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .detail-value {
            flex: 1;
            word-break: break-all;
        }
        .detail-text {
            font-size: 13px;
            line-height: 1.7;
            white-space: pre-wrap;
        }
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .tab {
            padding: 8px 12px;
            background: transparent;
            border: 0;
            border-bottom: 2px solid transparent;
            font-size: 13px;
        }
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        pre {
            background: #f8f8f8;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
            border: 1px solid var(--border);
        }
        .error {
            background: #fef0f0;
            color: var(--danger);
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            white-space: pre-wrap;
        }
        .loading {
            color: var(--primary);
            padding: 12px;
            font-size: 13px;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(340px, 420px);
            gap: 18px;
            width: min(1440px, 100%);
            margin: 0 auto;
            padding: 18px 24px 28px;
            align-items: start;
        }
        .results-panel, .inspector {
            min-width: 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .results-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 12px 12px 0 0;
        }
        .results-list { padding: 14px; }
        .results-time { color: var(--text-secondary); font-size: 12px; }
        .record { border-radius: 10px; box-shadow: none; }
        .record:hover, .record.active { box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08); }
        .inspector {
            position: sticky;
            top: 16px;
            max-height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .inspector-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border-bottom: 1px solid var(--border);
            flex: 0 0 auto;
        }
        .inspector-tab {
            border: 0;
            border-bottom: 2px solid transparent;
            border-radius: 0;
            padding: 13px 8px 11px;
            background: #fff;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .inspector-tab.active {
            color: #175cd3;
            border-bottom-color: #175cd3;
        }
        .inspector-panel { display: none; min-height: 280px; overflow: auto; }
        .inspector-panel.active { display: block; }
        .inspector-section { padding: 18px; }
        .inspector-section h2 { margin: 0 0 6px; font-size: 15px; }
        .inspector-section > p { margin: 0 0 16px; color: var(--text-secondary); font-size: 12px; line-height: 1.6; }
        .target-form { display: grid; gap: 10px; }
        .target-actions { display: flex; gap: 8px; }
        .target-actions .primary { flex: 1; }
        .target-result {
            margin-top: 16px;
            padding: 14px;
            border: 1px solid #d0d5dd;
            border-radius: 10px;
            background: #f8fafc;
            font-size: 13px;
            line-height: 1.65;
        }
        .target-result.success { border-color: #a6d7bd; background: #f0faf5; color: #05603a; }
        .target-result.warning { border-color: #f3cf8a; background: #fffaeb; color: #854a0e; }
        .target-result.error { border-color: #f1b4b4; background: #fff5f5; color: #9f1b1b; }
        .target-result.stale { border-color: #b9c8dc; background: #f5f8fc; color: #475467; }
        .target-result strong { display: block; margin-bottom: 3px; font-size: 15px; color: inherit; }
        .detail-overlay {
            position: static;
            width: auto;
            min-height: 280px;
            border: 0;
            box-shadow: none;
            transform: none;
            transition: none;
            display: none;
        }
        .inspector-panel.active .detail-overlay { display: flex; }
        .detail-overlay.open { transform: none; }
        .detail-header { padding: 14px 18px; }
        .detail-body { overflow: visible; padding: 16px 18px; }
        .request-panel { border: 0; }
        .request-body { max-height: none; padding: 16px 18px; overflow: visible; }
        .request-body pre { max-height: none; }

        @media (max-width: 900px) {
            .query-workbench { grid-template-columns: 1fr; }
            .request-params { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
            .builder-node,
            .builder-node.group-node {
                grid-template-columns: 1fr;
            }
            .builder-value-pair { grid-template-columns: 1fr; }
            .detail-overlay { width: 100vw; }
            .console-topbar, .search-panel { padding: 14px 16px; }
            .search-entry { grid-template-columns: 1fr; }
            .search-actions { justify-content: space-between; }
            .results-list { padding: 12px; }
            .workspace { grid-template-columns: 1fr; padding: 12px; }
            .inspector { position: static; max-height: none; overflow: visible; }
            .inspector-panel { overflow: visible; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="console-topbar">
            <div>
                <h1>专利检索</h1>
                <p>输入关键词或检索式，按 Ctrl / Command + Enter 或使用检索按钮开始。</p>
            </div>
        </header>
        <main>
            <section class="search-panel" aria-label="检索工作台">
                <form class="search-form" id="searchForm">
                    <label class="search-label" for="q">检索式</label>
                    <div class="search-entry">
                        <textarea id="q" rows="2" aria-describedby="queryStatus" placeholder="例如：阀门、ipc:H02M 或 title:(&quot;均衡&quot; OR &quot;平衡&quot;)"></textarea>
                        <div class="search-actions">
                            <button type="button" onclick="copyQuery()">复制检索式</button>
                            <button type="button" onclick="clearAllConditions()">清空</button>
                            <button class="primary" id="searchButton" type="submit">检索</button>
                        </div>
                    </div>
                    <div class="query-status" id="queryStatus" role="status" aria-live="polite">输入检索条件后开始检索。</div>
                    <div class="request-params">
                        <div class="request-param">
                            <label for="ds">数据范围</label>
                            <select id="ds">
                                <option value="cn" selected>中国</option>
                                <option value="all">全球</option>
                                <option value="us">美国</option>
                                <option value="jp">日本</option>
                                <option value="de">德国</option>
                                <option value="ep">欧洲专利局</option>
                                <option value="wo">WIPO</option>
                                <option value="kr">韩国</option>
                                <option value="gb">英国</option>
                                <option value="fr">法国</option>
                                <option value="ca">加拿大</option>
                                <option value="au">澳大利亚</option>
                            </select>
                        </div>
                        <div class="request-param">
                            <label for="sort">排序</label>
                            <select id="sort">
                                <option value="relation" selected>相关性</option>
                                <option value="rank">相关性（rank）</option>
                                <option value="relevance">相关性（relevance）</option>
                                <option value="score">相关性（score）</option>
                                <option value="applicationDate">申请日升序</option>
                                <option value="!applicationDate">申请日降序</option>
                                <option value="documentDate">公开日升序</option>
                                <option value="!documentDate">公开日降序</option>
                            </select>
                        </div>
                        <div class="request-param">
                            <label for="page">页码</label>
                            <input id="page" type="number" value="1" min="1">
                        </div>
                        <div class="request-param">
                            <label for="pageSize">每页数量</label>
                            <input id="pageSize" type="number" value="10" min="1" max="100">
                        </div>
                        <div class="request-param">
                            <label for="highlight">高亮</label>
                            <select id="highlight">
                                <option value="0" selected>关闭</option>
                                <option value="1">开启</option>
                            </select>
                        </div>
                    </div>
                    <button class="advanced-toggle" id="advancedToggle" type="button" onclick="toggleAdvancedPanel()" aria-controls="advancedPanel" aria-expanded="false">显示高级构建与参数</button>
                    <div class="advanced-panel" id="advancedPanel" hidden>
                        <div class="query-toolbar" aria-label="插入布尔操作符">
                            <button type="button" onclick="insertOp('AND')">AND</button>
                            <button type="button" onclick="insertOp('OR')">OR</button>
                            <button type="button" onclick="insertOp('NOT')">NOT</button>
                            <button type="button" onclick="insertOp('(')">(</button>
                            <button type="button" onclick="insertOp(')')">)</button>
                        </div>
                        <div class="builder-panel">
                    <div class="builder-header">
                        <h2>布尔构建器</h2>
                        <div class="builder-toolbar">
                            <button class="small" type="button" onclick="applyBuilderTemplate('textIpcExclude')">技术 + IPC + 排除</button>
                            <button class="small" type="button" onclick="applyBuilderTemplate('claimsDate')">权利要求 + 日期</button>
                            <button class="small" type="button" onclick="applyBuilderTemplate('numbers')">号码 OR</button>
                            <button class="small" type="button" onclick="applyBuilderTemplate('legalStatus')">法律状态 OR</button>
                        </div>
                    </div>
                    <div id="builderError" class="builder-error"></div>
                    <div id="builderTree" class="builder-tree"></div>
                    <div class="builder-group-actions">
                        <button class="small" type="button" onclick="addBuilderCondition('root')">添加条件</button>
                        <button class="small" type="button" onclick="addBuilderGroup('root')">添加分组</button>
                        <button class="small" type="button" onclick="applyBuilderQuery()">写入检索式</button>
                        <button class="small" type="button" onclick="resetBuilder()">重置构建器</button>
                    </div>
                    <div id="builderPreview" class="builder-preview"></div>
                        </div>

                        <datalist id="legalStatusOptions">
                    <option value="有效专利"></option>
                    <option value="在审"></option>
                    <option value="失效"></option>
                    <option value="实质审查"></option>
                    <option value="授权"></option>
                        </datalist>
                        <datalist id="typeOptions">
                    <option value="发明专利"></option>
                    <option value="实用新型"></option>
                    <option value="外观设计"></option>
                        </datalist>
                    </div>
                </form>
            </section>

        <div class="workspace">
            <section class="results-panel" aria-label="检索结果">
                <div class="results-header">
                    <span>当前检索共 <strong id="resultCount">0</strong> 件</span>
                    <span class="results-time" id="resultsTime">尚未检索</span>
                </div>
                <div class="results-list" id="records"></div>
                <div class="pagination" id="pagination"></div>
            </section>

            <aside class="inspector" aria-label="上下文检查器">
                <div class="inspector-tabs" role="tablist" aria-label="检查器内容">
                    <button class="inspector-tab active" id="targetTab" type="button" role="tab" aria-selected="true" aria-controls="targetPanel" onclick="switchInspector('targetPanel')">目标校验</button>
                    <button class="inspector-tab" id="patentTab" type="button" role="tab" aria-selected="false" aria-controls="patentPanel" onclick="switchInspector('patentPanel')">专利详情</button>
                    <button class="inspector-tab" id="logTab" type="button" role="tab" aria-selected="false" aria-controls="logPanel" onclick="switchInspector('logPanel')">请求日志</button>
                </div>
                <section class="inspector-panel active" id="targetPanel" role="tabpanel" aria-labelledby="targetTab">
                    <div class="inspector-section">
                        <h2>验证目标专利</h2>
                        <p>按当前检索式、数据范围和排序，验证一件目标专利是否命中及其全局并列名次。</p>
                        <form class="target-form" id="targetForm">
                            <label class="search-label" for="targetIdentifier">公开号 / 公告号 / patent_id</label>
                            <input id="targetIdentifier" name="target_identifier" autocomplete="off" placeholder="例如 CN119188170B">
                            <div class="target-actions">
                                <button class="primary" id="targetButton" type="submit">开始校验</button>
                                <button type="button" onclick="clearTargetValidation()">清除</button>
                            </div>
                        </form>
                        <div class="target-result" id="targetResult" role="status" aria-live="polite">
                            输入目标号码后开始校验。不会逐页扫描普通结果。
                        </div>
                    </div>
                </section>
                <section class="inspector-panel" id="patentPanel" role="tabpanel" aria-labelledby="patentTab" hidden>
                    <aside id="detailOverlay" class="detail-overlay" aria-labelledby="detailTitle" tabindex="-1">
                        <div class="detail-header">
                            <h3 id="detailTitle">专利详情</h3>
                            <button type="button" onclick="closeDetail()">关闭</button>
                        </div>
                        <div class="detail-body">
                            <div id="detailStatus"><div class="empty-state">从左侧结果选择一件专利查看详情。</div></div>
                            <div id="detailContent" style="display: none;">
                                <div class="detail-actions">
                                    <button class="small" type="button" onclick="copyPatentId()">复制专利 ID</button>
                                    <button class="small primary" type="button" onclick="loadFullDetail()">查看完整信息（含说明书）</button>
                                    <button class="small" type="button" onclick="loadCitations()">引证信息</button>
                                    <button class="small" type="button" onclick="loadLegalHistory()">法律历史</button>
                                    <button class="small" type="button" onclick="switchTab('detailRaw')">原始 JSON</button>
                                </div>
                                <div id="detailSummary"></div>
                                <div class="tabs" role="tablist" aria-label="详情内容">
                                    <button class="tab active" id="detailMainTab" type="button" role="tab" data-tab="detailMain" aria-controls="detailMain" aria-selected="true" onclick="switchTab('detailMain')">主要信息</button>
                                    <button class="tab" id="detailClaimsTab" type="button" role="tab" data-tab="detailClaims" aria-controls="detailClaims" aria-selected="false" tabindex="-1" onclick="switchTab('detailClaims')">权利要求</button>
                                    <button class="tab" id="detailExtraTab" type="button" role="tab" data-tab="detailExtra" aria-controls="detailExtra" aria-selected="false" tabindex="-1" onclick="switchTab('detailExtra')">引证 / 法律历史</button>
                                    <button class="tab" id="detailRawTab" type="button" role="tab" data-tab="detailRaw" aria-controls="detailRaw" aria-selected="false" tabindex="-1" onclick="switchTab('detailRaw')">原始响应</button>
                                </div>
                                <div id="detailMain" class="tab-content active" role="tabpanel" aria-labelledby="detailMainTab"></div>
                                <div id="detailClaims" class="tab-content" role="tabpanel" aria-labelledby="detailClaimsTab" hidden></div>
                                <div id="detailExtra" class="tab-content" role="tabpanel" aria-labelledby="detailExtraTab" hidden></div>
                                <div id="detailRaw" class="tab-content" role="tabpanel" aria-labelledby="detailRawTab" hidden></div>
                            </div>
                        </div>
                    </aside>
                </section>
                <section class="inspector-panel" id="logPanel" role="tabpanel" aria-labelledby="logTab" hidden>
                    <section class="request-panel" id="requestPanel">
                        <button class="request-header" id="requestToggle" type="button" onclick="toggleRequestPanel()" aria-controls="requestBody" aria-expanded="true">
                            <span>最近一次请求</span>
                            <span id="requestIndicator" aria-hidden="true">▾</span>
                        </button>
                        <div class="request-body" id="requestBody">
                            <pre id="requestInfo">暂无请求</pre>
                        </div>
                    </section>
                </section>
            </aside>
        </div>
        </main>
    </div>

    <script>
        const API_BASE = '/console-api';
        let builderRoot = null;
        let builderNextId = 1;
        let qTouchedManually = false;
        let lastResponse = null;
        let currentDetailId = null;
        let currentDetailData = null;
        let currentExtraData = null;
        let requestCollapsed = true;
        let detailTrigger = null;
        let targetValidation = null;
        let searchRequestId = 0;
        let targetRequestId = 0;
        let targetRequestPending = false;

        const QUERY_FIELDS = [
            { value: 'keyword', label: '普通关键词', kind: 'keyword', placeholder: '阀门' },
            { value: 'title', label: '标题 title', kind: 'text', placeholder: '均衡' },
            { value: 'ab', label: '摘要 ab', kind: 'text', placeholder: '平衡' },
            { value: 'tscd', label: '全文 tscd', kind: 'text', placeholder: '电液比例阀' },
            { value: 'mainClaim', label: '首权 mainClaim', kind: 'text', placeholder: '电路' },
            { value: 'claims', label: '权利要求 claims', kind: 'text', placeholder: '均衡' },
            { value: 'description', label: '说明书 description', kind: 'text', placeholder: '外观' },
            { value: 'applicant', label: '申请人 applicant', kind: 'text', placeholder: '华为技术有限公司' },
            { value: 'currentAssignee', label: '当前权利人 currentAssignee', kind: 'text', placeholder: '华为技术有限公司' },
            { value: 'agency', label: '代理机构 agency', kind: 'text', placeholder: '知识产权代理' },
            { value: 'agent', label: '代理人 agent', kind: 'text', placeholder: '张三' },
            { value: 'type', label: '专利类型 type', kind: 'enum', placeholder: '发明专利', list: 'typeOptions' },
            { value: 'ipc', label: 'IPC ipc', kind: 'classification', placeholder: 'H02M' },
            { value: 'mainIpc', label: '主 IPC mainIpc', kind: 'classification', placeholder: 'H02M' },
            { value: 'legalStatus', label: '法律状态 legalStatus', kind: 'enum', placeholder: '有效专利', list: 'legalStatusOptions' },
            { value: 'applicationNumber', label: '申请号 applicationNumber', kind: 'identifier', placeholder: 'CN202411108082.1' },
            { value: 'documentNumber', label: '公开号 documentNumber', kind: 'identifier', placeholder: 'CN119188170B' },
            { value: 'publicationNumber', label: '公开号 publicationNumber', kind: 'identifier', placeholder: 'CN119188170B' },
            { value: 'patentId', label: '专利 ID patentId', kind: 'identifier', placeholder: 'cn-xxx' },
            { value: 'ad', label: '申请日 ad', kind: 'dateRange' },
            { value: 'documentYear', label: '公开年 documentYear', kind: 'yearRange' }
        ];

        function nextBuilderId() {
            builderNextId += 1;
            return `node-${builderNextId}`;
        }

        function createBuilderGroup(id, children, connector) {
            return {
                type: 'group',
                id: id || nextBuilderId(),
                connector: connector || 'AND',
                children: children || []
            };
        }

        function createBuilderCondition(fieldValue, connector) {
            const field = getQueryField(fieldValue || 'keyword');
            const base = {
                type: 'condition',
                id: nextBuilderId(),
                connector: connector || 'AND',
                field: field.value,
                mode: field.kind === 'text' || field.kind === 'keyword' ? 'single' : 'fixed',
                value: '',
                values: [],
                start: '',
                end: ''
            };
            if (field.kind === 'keyword') return { ...base, value: '阀门' };
            if (field.kind === 'text') return { ...base, value: field.placeholder || '均衡', values: ['均衡', '平衡'] };
            if (field.kind === 'classification') return { ...base, value: field.placeholder || 'H02M' };
            if (field.kind === 'identifier') return { ...base, value: field.placeholder || '' };
            if (field.kind === 'enum') return { ...base, value: field.placeholder || '' };
            if (field.kind === 'dateRange') return { ...base, mode: 'range', start: '2020-01-01', end: '2020-12-31' };
            if (field.kind === 'yearRange') return { ...base, mode: 'range', start: '2020', end: '2024' };
            return base;
        }

        function createDefaultBuilderTree() {
            return createBuilderGroup('root', [createBuilderCondition('keyword', 'AND')]);
        }

        function getQueryField(value) {
            return QUERY_FIELDS.find(field => field.value === value) || QUERY_FIELDS[0];
        }

        function toggleAdvancedPanel() {
            const panel = document.getElementById('advancedPanel');
            const toggle = document.getElementById('advancedToggle');
            const expanded = panel.hidden;
            panel.hidden = !expanded;
            toggle.setAttribute('aria-expanded', String(expanded));
            toggle.textContent = expanded ? '隐藏高级构建与参数' : '显示高级构建与参数';
        }

        function setQueryStatus(message, state) {
            const status = document.getElementById('queryStatus');
            status.textContent = message;
            status.className = `query-status${state ? ` ${state}` : ''}`;
        }

        function init() {
            builderRoot = createDefaultBuilderTree();
            renderBuilder();
            updateBuilderPreview();
            const qEl = document.getElementById('q');
            if (qEl && qEl.addEventListener) {
                qEl.addEventListener('input', () => {
                    qTouchedManually = true;
                    invalidateSearchRequest();
                    invalidateTargetValidation();
                    setQueryStatus('检索式已更新，按 Enter 或点击检索提交。');
                });
                qEl.addEventListener('keydown', event => {
                    if (event.key === 'Enter' && (event.ctrlKey || event.metaKey)) {
                        event.preventDefault();
                        doSearch();
                    }
                });
            }
            document.getElementById('searchForm').addEventListener('submit', event => {
                event.preventDefault();
                doSearch();
            });
            document.getElementById('targetForm').addEventListener('submit', event => {
                event.preventDefault();
                testTargetRank();
            });
            document.getElementById('targetIdentifier').addEventListener('input', invalidateTargetValidation);
            ['ds', 'sort'].forEach(id => {
                document.getElementById(id).addEventListener('change', () => {
                    invalidateSearchRequest();
                    invalidateTargetValidation();
                });
            });
            document.querySelectorAll('.inspector-tab').forEach(tab => {
                tab.addEventListener('keydown', handleInspectorKeydown);
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('keydown', handleDetailTabKeydown);
            });
            loadState();
            setRequestPanelCollapsed(false);
            clearResults();
        }

        function handleInspectorKeydown(event) {
            if (!['ArrowLeft', 'ArrowRight'].includes(event.key)) return;
            const tabs = Array.from(document.querySelectorAll('.inspector-tab'));
            const current = tabs.indexOf(event.currentTarget);
            const offset = event.key === 'ArrowRight' ? 1 : -1;
            const next = tabs[(current + offset + tabs.length) % tabs.length];
            event.preventDefault();
            switchInspector(next.getAttribute('aria-controls'));
            next.focus();
        }

        function handleDetailTabKeydown(event) {
            if (!['ArrowLeft', 'ArrowRight'].includes(event.key)) return;
            const tabs = Array.from(document.querySelectorAll('.tab'));
            const current = tabs.indexOf(event.currentTarget);
            const offset = event.key === 'ArrowRight' ? 1 : -1;
            const next = tabs[(current + offset + tabs.length) % tabs.length];
            event.preventDefault();
            switchTab(next.dataset.tab);
            next.focus();
        }

        function switchInspector(panelId) {
            document.querySelectorAll('.inspector-tab').forEach(tab => {
                const active = tab.getAttribute('aria-controls') === panelId;
                tab.classList.toggle('active', active);
                tab.setAttribute('aria-selected', String(active));
                tab.tabIndex = active ? 0 : -1;
            });
            document.querySelectorAll('.inspector-panel').forEach(panel => {
                const active = panel.id === panelId;
                panel.classList.toggle('active', active);
                panel.hidden = !active;
            });
        }

        function renderBuilder() {
            const container = document.getElementById('builderTree');
            if (!container) return;
            container.innerHTML = renderBuilderGroup(builderRoot, 0, true);
        }

        function renderBuilderGroup(group, depth, isRoot) {
            const children = group.children.length === 0
                ? '<div class="hint">本分组暂无条件</div>'
                : group.children.map((node, index) => renderBuilderNode(node, group.id, index, depth + 1)).join('');
            return `
                <div class="builder-group depth-${Math.min(depth, 3)}">
                    <div class="builder-group-title">
                        <span>${isRoot ? '根分组' : '子分组'}</span>
                        <div class="builder-group-actions">
                            <button class="small" type="button" onclick="addBuilderCondition('${group.id}')">条件</button>
                            <button class="small" type="button" onclick="addBuilderGroup('${group.id}')">分组</button>
                        </div>
                    </div>
                    <div class="builder-children">${children}</div>
                </div>
            `;
        }

        function renderBuilderNode(node, parentId, index, depth) {
            if (node.type === 'group') {
                return `
                    <div class="builder-node group-node">
                        <div>
                            <label>连接</label>
                            ${renderConnectorSelect(parentId, index, node.connector)}
                        </div>
                        <div>
                            <label>分组</label>
                            <div class="hint">生成时自动加括号</div>
                        </div>
                        <div class="builder-node-actions">
                            <button class="small" type="button" onclick="removeBuilderNode('${parentId}', ${index})">删除</button>
                        </div>
                    </div>
                    ${renderBuilderGroup(node, depth, false)}
                `;
            }
            const field = getQueryField(node.field);
            return `
                <div class="builder-node">
                    <div>
                        <label>连接</label>
                        ${renderConnectorSelect(parentId, index, node.connector)}
                    </div>
                    <div>
                        <label>字段</label>
                        <select onchange="changeBuilderField('${parentId}', ${index}, this.value)">
                            ${QUERY_FIELDS.map(item => optionHtml(item.value, item.label, node.field)).join('')}
                        </select>
                    </div>
                    <div>
                        <label>模式</label>
                        ${renderModeControl(parentId, index, node, field)}
                    </div>
                    <div class="builder-value">
                        <label>值</label>
                        ${renderValueControl(parentId, index, node, field)}
                    </div>
                    <div class="builder-node-actions">
                        <button class="small" type="button" onclick="removeBuilderNode('${parentId}', ${index})">删除</button>
                    </div>
                </div>
            `;
        }

        function renderConnectorSelect(parentId, index, value) {
            return `
                <select onchange="updateBuilderNode('${parentId}', ${index}, 'connector', this.value)" ${index === 0 ? 'disabled' : ''}>
                    ${optionHtml('AND', 'AND', value)}
                    ${optionHtml('OR', 'OR', value)}
                    ${optionHtml('AND NOT', 'AND NOT', value)}
                </select>
            `;
        }

        function renderModeControl(parentId, index, node, field) {
            if (field.kind === 'text') {
                return `
                    <select onchange="changeBuilderMode('${parentId}', ${index}, this.value)">
                        ${optionHtml('single', '普通全文', node.mode)}
                        ${optionHtml('phrase', '完整短语（严格）', node.mode)}
                        ${optionHtml('or', 'OR 短语', node.mode)}
                    </select>
                `;
            }
            if (field.kind === 'keyword') {
                return `
                    <select onchange="changeBuilderMode('${parentId}', ${index}, this.value)">
                        ${optionHtml('single', '单值', node.mode)}
                        ${optionHtml('or', 'OR 词组', node.mode)}
                    </select>
                `;
            }
            return '<input type="text" value="固定" disabled>';
        }

        function renderValueControl(parentId, index, node, field) {
            if (field.kind === 'dateRange') {
                return `
                    <div class="builder-value-pair">
                        <input type="date" value="${escapeHtml(node.start || '')}" onchange="updateBuilderNode('${parentId}', ${index}, 'start', this.value)">
                        <input type="date" value="${escapeHtml(node.end || '')}" onchange="updateBuilderNode('${parentId}', ${index}, 'end', this.value)">
                    </div>
                `;
            }
            if (field.kind === 'yearRange') {
                return `
                    <div class="builder-value-pair">
                        <input type="number" min="1900" max="2100" value="${escapeHtml(node.start || '')}" onchange="updateBuilderNode('${parentId}', ${index}, 'start', this.value)">
                        <input type="number" min="1900" max="2100" value="${escapeHtml(node.end || '')}" onchange="updateBuilderNode('${parentId}', ${index}, 'end', this.value)">
                    </div>
                `;
            }
            if ((field.kind === 'text' || field.kind === 'keyword') && node.mode === 'or') {
                return `<textarea placeholder="每行一个词" oninput="updateBuilderValues('${parentId}', ${index}, this.value)">${escapeHtml((node.values || []).join('\n'))}</textarea>`;
            }
            const listAttr = field.list ? ` list="${field.list}"` : '';
            const phraseHint = field.kind === 'text' && node.mode === 'phrase'
                ? '<div class="hint">按分词结果连续匹配；预览会生成带英文引号的短语查询。</div>'
                : '';
            return `
                <input type="text"${listAttr} value="${escapeHtml(node.value || '')}" placeholder="${escapeHtml(field.placeholder || '')}" oninput="updateBuilderNode('${parentId}', ${index}, 'value', this.value)">
                ${phraseHint}
            `;
        }

        function optionHtml(value, label, selected) {
            return `<option value="${escapeHtml(value)}" ${value === selected ? 'selected' : ''}>${escapeHtml(label)}</option>`;
        }

        function findBuilderNode(id, node) {
            const current = node || builderRoot;
            if (!current) return null;
            if (current.id === id) return current;
            if (current.type !== 'group') return null;
            for (const child of current.children) {
                const found = findBuilderNode(id, child);
                if (found) return found;
            }
            return null;
        }

        function addBuilderCondition(parentId, fieldValue) {
            const group = findBuilderNode(parentId || 'root');
            if (!group || group.type !== 'group') return;
            group.children.push(createBuilderCondition(fieldValue || 'title', group.children.length === 0 ? 'AND' : 'AND'));
            renderBuilder();
            updateBuilderPreview();
        }

        function addBuilderGroup(parentId) {
            const group = findBuilderNode(parentId || 'root');
            if (!group || group.type !== 'group') return;
            const child = createBuilderGroup(nextBuilderId(), [createBuilderCondition('title', 'AND')], group.children.length === 0 ? 'AND' : 'AND');
            group.children.push(child);
            renderBuilder();
            updateBuilderPreview();
        }

        function removeBuilderNode(parentId, index) {
            const parent = findBuilderNode(parentId);
            if (!parent || !parent.children[index]) return;
            parent.children.splice(index, 1);
            if (parent.children[0]) parent.children[0].connector = 'AND';
            renderBuilder();
            updateBuilderPreview();
        }

        function updateBuilderNode(parentId, index, key, value) {
            const parent = findBuilderNode(parentId);
            if (!parent || !parent.children[index]) return;
            parent.children[index][key] = value;
            updateBuilderPreview();
        }

        function updateBuilderValues(parentId, index, raw) {
            const parent = findBuilderNode(parentId);
            if (!parent || !parent.children[index]) return;
            parent.children[index].values = raw.split('\n').map(item => item.trim()).filter(Boolean);
            updateBuilderPreview();
        }

        function changeBuilderField(parentId, index, fieldValue) {
            const parent = findBuilderNode(parentId);
            if (!parent || !parent.children[index]) return;
            parent.children[index] = createBuilderCondition(fieldValue, parent.children[index].connector);
            renderBuilder();
            updateBuilderPreview();
        }

        function changeBuilderMode(parentId, index, mode) {
            const parent = findBuilderNode(parentId);
            if (!parent || !parent.children[index]) return;
            parent.children[index].mode = mode;
            renderBuilder();
            updateBuilderPreview();
        }

        function resetBuilder() {
            builderRoot = createDefaultBuilderTree();
            qTouchedManually = false;
            renderBuilder();
            updateBuilderPreview();
        }

        function clearAllConditions() {
            resetBuilder();
            document.getElementById('q').value = '';
            qTouchedManually = true;
            invalidateTargetValidation();
            setQueryStatus('已清空检索条件。');
            clearResults();
        }

        function applyBuilderTemplate(name) {
            builderNextId = 1;
            if (name === 'textIpcExclude') {
                builderRoot = createBuilderGroup('root', [
                    createBuilderGroup(nextBuilderId(), [
                        createBuilderGroup(nextBuilderId(), [
                            condition('title', 'AND', 'single', '均衡'),
                            condition('ab', 'OR', 'single', '平衡')
                        ], 'AND'),
                        createBuilderGroup(nextBuilderId(), [
                            condition('ipc', 'AND', 'fixed', 'H02M'),
                            condition('ipc', 'OR', 'fixed', 'F16K')
                        ], 'AND')
                    ], 'AND'),
                    condition('description', 'AND NOT', 'single', '外观')
                ]);
            } else if (name === 'claimsDate') {
                const date = condition('ad', 'AND', 'range', '');
                date.start = '2020-01-01';
                date.end = '2020-12-31';
                builderRoot = createBuilderGroup('root', [
                    { ...condition('claims', 'AND', 'or', ''), values: ['均衡', '平衡'] },
                    date
                ]);
            } else if (name === 'numbers') {
                builderRoot = createBuilderGroup('root', [
                    createBuilderGroup(nextBuilderId(), [
                        condition('applicationNumber', 'AND', 'fixed', 'CN202411108082.1'),
                        condition('documentNumber', 'OR', 'fixed', 'CN119188170B')
                    ], 'AND')
                ]);
            } else if (name === 'legalStatus') {
                builderRoot = createBuilderGroup('root', [
                    createBuilderGroup(nextBuilderId(), [
                        condition('legalStatus', 'AND', 'fixed', '有效专利'),
                        condition('legalStatus', 'OR', 'fixed', '实质审查')
                    ], 'AND')
                ]);
            }
            qTouchedManually = false;
            renderBuilder();
            applyBuilderQuery();
        }

        function condition(field, connector, mode, value) {
            const item = createBuilderCondition(field, connector);
            item.mode = mode || item.mode;
            item.value = value || item.value;
            return item;
        }

        function buildQueryFromTree(tree) {
            return buildBuilderGroupQuery(tree, true);
        }

        function buildBuilderGroupQuery(group, isRoot) {
            if (!group || group.type !== 'group') return { error: '分组非法' };
            if (!group.children || group.children.length === 0) return { error: '分组不能为空' };

            const parts = [];
            for (let index = 0; index < group.children.length; index += 1) {
                const child = group.children[index];
                const built = child.type === 'group'
                    ? buildBuilderGroupQuery(child, false)
                    : buildBuilderCondition(child);
                if (built.error) return { error: built.error };
                if (parts.length === 0) {
                    parts.push(built.q);
                } else {
                    parts.push(`${normalizeConnector(child.connector)} ${built.q}`);
                }
            }
            const q = parts.join(' ');
            return { q: isRoot ? q : `(${q})` };
        }

        function buildBuilderCondition(node) {
            const field = getQueryField(node.field);
            if (field.kind === 'keyword') {
                if (node.mode === 'or') {
                    const values = normalizedValues(node.values);
                    if (values.length === 0) return { error: '普通关键词 OR 词组不能为空' };
                    return { q: `(${values.map(quoteTerm).join(' OR ')})` };
                }
                const value = normalizedValue(node.value);
                if (!value) return { error: '普通关键词不能为空' };
                return { q: value };
            }
            if (field.kind === 'text') {
                if (node.mode === 'or') {
                    const values = normalizedValues(node.values);
                    if (values.length === 0) return { error: `${field.label} OR 词组不能为空` };
                    return { q: `${field.value}:(${values.map(quoteTerm).join(' OR ')})` };
                }
                const value = normalizedValue(node.value);
                if (!value) return { error: `${field.label}不能为空` };
                if (node.mode === 'phrase') {
                    return { q: `${field.value}:${quoteTerm(value)}` };
                }
                return { q: `${field.value}:(${formatTerm(value)})` };
            }
            if (field.kind === 'classification') {
                const value = normalizedValue(node.value).toUpperCase();
                if (!value) return { error: `${field.label}不能为空` };
                return { q: `${field.value}:${value}` };
            }
            if (field.kind === 'identifier') {
                const value = normalizedValue(node.value);
                if (!value) return { error: `${field.label}不能为空` };
                return { q: `${field.value}:${value}` };
            }
            if (field.kind === 'enum') {
                const value = normalizedValue(node.value);
                if (!value) return { error: `${field.label}不能为空` };
                return { q: `${field.value}:(${formatTerm(value)})` };
            }
            if (field.kind === 'dateRange') {
                if (!node.start || !node.end) return { error: `${field.label}起止日期都必须填写` };
                return { q: `${field.value}:[${node.start} TO ${node.end}]` };
            }
            if (field.kind === 'yearRange') {
                if (!/^\d{4}$/.test(node.start || '') || !/^\d{4}$/.test(node.end || '')) {
                    return { error: `${field.label}必须是4位年份` };
                }
                return { q: `${field.value}:[${node.start} TO ${node.end}]` };
            }
            return { error: '不支持的字段类型' };
        }

        function normalizeConnector(value) {
            return value === 'OR' || value === 'AND NOT' ? value : 'AND';
        }

        function normalizedValue(value) {
            return normalizePhraseQuotes(value).trim();
        }

        function normalizedValues(values) {
            return (values || []).map(normalizedValue).filter(Boolean);
        }

        function formatTerm(value) {
            const escaped = escapeQuery(value);
            if (/\s/.test(escaped) && !/^".*"$/.test(escaped)) return `"${escaped}"`;
            return escaped;
        }

        function quoteTerm(value) {
            return `"${escapeQuery(value)}"`;
        }

        function escapeQuery(value) {
            return normalizePhraseQuotes(value).replace(/"/g, '');
        }

        function normalizePhraseQuotes(value) {
            return String(value || '').replace(/[“”]/g, '"');
        }

        function updateBuilderPreview() {
            const result = buildQueryFromTree(builderRoot);
            const preview = document.getElementById('builderPreview');
            const error = document.getElementById('builderError');
            if (result.error) {
                preview.textContent = '';
                error.innerHTML = `<div class="error">${escapeHtml(result.error)}</div>`;
                return;
            }
            error.innerHTML = '';
            preview.textContent = result.q;
            setQueryStatus('构建器预览已更新。点击“写入检索式”后覆盖当前输入。');
        }

        function applyBuilderQuery() {
            const result = buildQueryFromTree(builderRoot);
            if (result.error) {
                document.getElementById('builderError').innerHTML = `<div class="error">${escapeHtml(result.error)}</div>`;
                return;
            }
            document.getElementById('builderError').innerHTML = '';
            document.getElementById('builderPreview').textContent = result.q;
            document.getElementById('q').value = result.q;
            qTouchedManually = false;
            invalidateTargetValidation();
            setQueryStatus('已将构建结果写入检索式。确认后点击检索。', 'success');
            document.getElementById('q').focus();
        }

        window.consoleQueryBuilder = {
            fields: QUERY_FIELDS,
            buildQueryFromTree
        };

        function insertOp(op) {
            const el = document.getElementById('q');
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const value = el.value;
            const before = value.substring(0, start);
            const after = value.substring(end);
            const insert = op.length === 1 ? op : ` ${op} `;
            el.value = before + insert + after;
            el.focus();
            el.setSelectionRange(start + insert.length, start + insert.length);
            qTouchedManually = true;
            invalidateTargetValidation();
            setQueryStatus('检索式已更新，按 Enter 或点击检索提交。');
        }

        function getForm() {
            const qEl = document.getElementById('q');
            const q = normalizePhraseQuotes(qEl.value).trim();
            if (q !== qEl.value) qEl.value = q;
            return {
                q,
                ds: document.getElementById('ds').value,
                sort: document.getElementById('sort').value,
                page: parseInt(document.getElementById('page').value, 10) || 1,
                page_size: parseInt(document.getElementById('pageSize').value, 10) || 10,
                highlight: parseInt(document.getElementById('highlight').value, 10) || 0
            };
        }

        function saveState() {
            try {
                localStorage.setItem('patentConsole:lastSearch', JSON.stringify({ q: document.getElementById('q').value, response: lastResponse }));
            } catch (e) {}
        }

        function loadState() {
            try {
                const raw = localStorage.getItem('patentConsole:lastSearch');
                if (!raw) return;
                const state = JSON.parse(raw);
                if (state.q !== undefined) {
                    document.getElementById('q').value = state.q;
                    qTouchedManually = true;
                    setQueryStatus('已恢复上次检索式。');
                }
                if (state.response) {
                    lastResponse = state.response;
                    renderResults(state.response);
                }
            } catch (e) {}
        }

            if (toggle) {
                toggle.setAttribute('aria-expanded', String(!collapsed));
            }
            const indicator = document.getElementById('requestIndicator');
            if (indicator) indicator.textContent = collapsed ? '▸' : '▾';
        }

        function setRequestInfo(text) {
            const panel = document.getElementById('requestPanel');
            document.getElementById('requestInfo').textContent = text;
            panel.hidden = false;
        }

        function toggleRequestPanel() {
            setRequestPanelCollapsed(!requestCollapsed);
        }

        function clearResults() {
            document.getElementById('resultCount').textContent = '0';
            document.getElementById('resultsTime').textContent = '尚未检索';
            document.getElementById('records').innerHTML = '';
            document.getElementById('pagination').innerHTML = '';
            lastResponse = null;
            document.getElementById('records').innerHTML = '<div class="empty-state">从一个关键词开始，或展开高级构建器生成检索式。</div>';
        }

        async function doSearch(page) {
            const requestId = ++searchRequestId;
            const form = getForm();
            const q = form.q;
            if (!q) {
                setQueryStatus('请输入关键词或有效检索式后再检索。', 'error');
                document.getElementById('q').focus();
                return;
            }

            if (page) {
                form.page = page;
                document.getElementById('page').value = page;
            }

            const payload = {
                q,
                ds: form.ds,
                sort: form.sort,
                page: form.page,
                page_size: form.page_size,
                highlight: form.highlight
            };

            try {
                const button = document.getElementById('searchButton');
                button.disabled = true;
                button.textContent = '检索中';
                setQueryStatus('正在检索，请稍候。', 'loading');
                const started = performance.now();
                const response = await fetch(`${API_BASE}/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const elapsed = (performance.now() - started).toFixed(0);
                if (requestId !== searchRequestId) return;

                if (!response.ok) {
                    const message = data.detail || data.message || JSON.stringify(data);
                    setRequestInfo(`POST ${API_BASE}/search\n${JSON.stringify(payload, null, 2)}\n\nHTTP ${response.status} (${elapsed}ms)\n${typeof message === 'object' ? JSON.stringify(message, null, 2) : message}`);
                    setQueryStatus(`检索失败：${typeof message === 'object' ? JSON.stringify(message) : message}。请修改检索式后重试。`, 'error');
                    return;
                }

                lastResponse = data;
                saveState();
                renderResults(data);
                setRequestInfo(`POST ${API_BASE}/search\n${JSON.stringify(payload, null, 2)}\n\nHTTP ${response.status} (${elapsed}ms)\n${JSON.stringify(data, null, 2).slice(0, 4000)}`);
                setQueryStatus(data.total ? `已找到 ${data.total} 条结果。` : '没有找到结果。请调整关键词、范围或展开高级构建器。', data.total ? 'success' : '');
            } catch (err) {
                if (requestId !== searchRequestId) return;
                setRequestInfo(`POST ${API_BASE}/search\n${JSON.stringify(payload, null, 2)}\n\nError: ${err.message}`);
                setQueryStatus(`网络错误：${err.message}。请检查连接后重试。`, 'error');
            } finally {
                if (requestId === searchRequestId) {
                    const button = document.getElementById('searchButton');
                    button.disabled = false;
                    button.textContent = '检索';
                }
            }
        }

        function renderResults(data) {
            document.getElementById('resultCount').textContent = data.total || 0;
            document.getElementById('resultsTime').textContent = data.took_ms === null || data.took_ms === undefined
                ? '耗时未知'
                : `耗时 ${data.took_ms} ms`;
            const recordsEl = document.getElementById('records');
            if (!data.records || data.records.length === 0) {
                recordsEl.innerHTML = '<div class="empty-state">没有匹配结果。尝试缩短关键词、调整数据范围，或展开高级构建器重新组合条件。</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            recordsEl.innerHTML = data.records.map((record, index) => `
                <article class="record">
                    <div class="record-title">${(data.page - 1) * data.page_size + index + 1}. ${escapeHtml(record.title || '(无标题)')}</div>
                    <div class="record-meta">
                        <span>专利ID: ${escapeHtml(record.patent_id || '')}</span>
                        <span>申请号: ${escapeHtml(record.applicationNumber || '')}</span>
                        <span>公开号: ${escapeHtml(record.documentNumber || '')}</span>
                    </div>
                    <div class="record-meta">
                        <span>申请人: ${escapeHtml(record.applicant || '')}</span>
                        <span>主IPC: ${escapeHtml(record.mainIpc || '')}</span>
                        <span>申请日: ${escapeHtml(record.applicationDate || '')}</span>
                        <span>法律状态: ${escapeHtml(record.legalStatus || '')}</span>
                    </div>
                    <div class="record-abstract">${escapeHtml(record.abstract || '')}</div>
                    <div class="record-actions">
                        <button class="small" type="button" onclick="copyText('${escapeHtml(record.patent_id || '')}')">复制 ID</button>
                        <button class="small primary" type="button" onclick="openDetail('${escapeHtml(record.patent_id || '')}')">查看详情</button>
                    </div>
                </article>
            `).join('');

            renderPagination(data);
        }

        function renderPagination(data) {
            const totalPages = data.total_pages || 0;
            const page = data.page || 1;
            const el = document.getElementById('pagination');
            if (totalPages <= 1) {
                el.innerHTML = '';
                return;
            }
            let html = '';
            if (page > 1) html += `<button type="button" onclick="doSearch(${page - 1})">上一页</button>`;
            html += `<span>第 ${page} / ${totalPages} 页</span>`;
            if (page < totalPages) html += `<button type="button" onclick="doSearch(${page + 1})">下一页</button>`;
            el.innerHTML = html;
        }

        function copyQuery() {
            copyText(document.getElementById('q').value);
        }

        function copyPatentId() {
            if (currentDetailId) copyText(currentDetailId);
        }

        function copyText(text) {
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制到剪贴板');
            });
        }

        function targetFingerprint() {
            const form = getForm();
            return JSON.stringify({
                q: form.q,
                ds: form.ds,
                sort: form.sort,
                target_identifier: document.getElementById('targetIdentifier').value.trim()
            });
        }

        function invalidateSearchRequest() {
            const button = document.getElementById('searchButton');
            if (!button.disabled) return;
            searchRequestId += 1;
            button.disabled = false;
            button.textContent = '检索';
        }

        function invalidateTargetValidation() {
            targetRequestId += 1;
            if (targetRequestPending) {
                targetRequestPending = false;
                const button = document.getElementById('targetButton');
                button.disabled = false;
                button.textContent = '开始校验';
                const result = document.getElementById('targetResult');
                result.className = 'target-result stale';
                result.innerHTML = '<strong>校验已取消</strong>条件发生变化，请按当前条件重新校验。';
                return;
            }
            if (!targetValidation || targetValidation.fingerprint === targetFingerprint()) return;
            targetValidation = null;
            const result = document.getElementById('targetResult');
            result.className = 'target-result stale';
            result.innerHTML = '<strong>结论已过期</strong>检索式、数据范围、排序或目标号码已变化，请重新校验。';
        }

        function clearTargetValidation() {
            targetRequestId += 1;
            targetRequestPending = false;
            document.getElementById('targetIdentifier').value = '';
            targetValidation = null;
            const result = document.getElementById('targetResult');
            result.className = 'target-result';
            result.textContent = '输入目标号码后开始校验。不会逐页扫描普通结果。';
            document.getElementById('targetIdentifier').focus();
        }

        async function testTargetRank() {
            const form = getForm();
            const targetIdentifier = document.getElementById('targetIdentifier').value.trim();
            const result = document.getElementById('targetResult');
            if (!targetIdentifier) {
                result.className = 'target-result error';
                result.innerHTML = '<strong>请输入目标号码</strong>支持公开号、公告号或内部 patent_id。';
                document.getElementById('targetIdentifier').focus();
                return;
            }
            if (!form.q) {
                result.className = 'target-result error';
                result.innerHTML = '<strong>缺少检索式</strong>请先填写当前需要验证的检索式。';
                document.getElementById('q').focus();
                return;
            }

            const payload = { q: form.q, ds: form.ds, sort: form.sort, target_identifier: targetIdentifier };
            const fingerprint = targetFingerprint();
            const requestId = ++targetRequestId;
            const button = document.getElementById('targetButton');
            targetRequestPending = true;
            button.disabled = true;
            button.textContent = '校验中';
            result.className = 'target-result';
            result.innerHTML = '<strong>正在校验</strong>正在计算目标专利在完整结果集中的并列名次。';
            try {
                const started = performance.now();
                const response = await fetch(`${API_BASE}/test/target-rank`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const elapsed = (performance.now() - started).toFixed(0);
                if (requestId !== targetRequestId) return;
                targetRequestPending = false;
                setRequestInfo(`POST ${API_BASE}/test/target-rank\n${JSON.stringify(payload, null, 2)}\n\nHTTP ${response.status} (${elapsed}ms)\n${JSON.stringify(data, null, 2)}`);
                if (!response.ok) {
                    const message = data.message || data.detail || JSON.stringify(data);
                    result.className = 'target-result error';
                    result.innerHTML = `<strong>校验失败</strong>${escapeHtml(typeof message === 'object' ? JSON.stringify(message) : message)}。普通检索结果仍可继续使用。`;
                    return;
                }
                if (fingerprint !== targetFingerprint()) {
                    targetValidation = null;
                    result.className = 'target-result stale';
                    result.innerHTML = '<strong>结论已过期</strong>校验期间查询条件发生变化，请重新校验。';
                    return;
                }
                targetValidation = { fingerprint, data };
                renderTargetResult(data);
            } catch (err) {
                if (requestId !== targetRequestId) return;
                targetRequestPending = false;
                setRequestInfo(`POST ${API_BASE}/test/target-rank\n${JSON.stringify(payload, null, 2)}\n\nError: ${err.message}`);
                result.className = 'target-result error';
                result.innerHTML = `<strong>网络请求失败</strong>${escapeHtml(err.message)}。普通检索结果仍可继续使用。`;
            } finally {
                if (requestId === targetRequestId) {
                    targetRequestPending = false;
                    button.disabled = false;
                    button.textContent = '开始校验';
                }
            }
        }

        function renderTargetResult(data) {
            const result = document.getElementById('targetResult');
            const target = data.target || {};
            const targetText = [target.documentNumber, target.title].filter(Boolean).map(escapeHtml).join(' · ');
            if (data.status === 'matched') {
                const tieText = data.tied_count > 0 ? `，与另外 ${data.tied_count} 件并列` : '';
                result.className = 'target-result success';
                result.innerHTML = `<strong>已命中 · 第 ${data.rank} 名</strong>${targetText || '目标专利'}${tieText}`;
            } else if (data.status === 'not_in_results') {
                result.className = 'target-result warning';
                result.innerHTML = `<strong>未被当前查询召回</strong>${targetText || '目标专利存在于索引中'}，但不满足当前检索式或数据范围。`;
            } else if (data.status === 'target_not_found') {
                result.className = 'target-result warning';
                result.innerHTML = '<strong>索引中不存在该目标</strong>请检查公开号、公告号或 patent_id 是否准确。';
            } else if (data.status === 'ambiguous_target') {
                result.className = 'target-result warning';
                result.innerHTML = `<strong>目标号码对应多条记录</strong>共找到 ${data.tied_count || 2} 条记录，无法给出唯一排名。`;
            }
        }

        async function openDetail(patentId) {
            if (!patentId) return;
            detailTrigger = document.activeElement;
            currentDetailId = patentId;
            currentDetailData = null;
            currentExtraData = null;

            switchInspector('patentPanel');
            document.getElementById('detailOverlay').classList.add('open');
            document.getElementById('detailContent').style.display = 'none';
            document.getElementById('detailStatus').innerHTML = '<div class="loading">加载详情中...</div>';
            switchTab('detailMain');
            document.getElementById('detailOverlay').focus();

            await fetchDetail(patentId, false);
        }

        async function loadFullDetail() {
            if (!currentDetailId) return;
            document.getElementById('detailStatus').innerHTML = '<div class="loading">加载完整信息（含说明书）...</div>';
            await fetchDetail(currentDetailId, true);
        }

        async function fetchDetail(patentId, includeDescription) {
            try {
                const response = await fetch(`${API_BASE}/detail/${encodeURIComponent(patentId)}?include_description=${includeDescription}`);
                const data = await response.json();
                if (!response.ok) {
                    document.getElementById('detailStatus').innerHTML = `<div class="error">HTTP ${response.status}\n${data.message || JSON.stringify(data)}</div>`;
                    return;
                }
                currentDetailData = data;
                renderDetail(data);
                document.getElementById('detailStatus').innerHTML = '';
                document.getElementById('detailContent').style.display = 'block';
            } catch (err) {
                document.getElementById('detailStatus').innerHTML = `<div class="error">请求失败：${err.message}</div>`;
            }
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('open');
            document.getElementById('detailContent').style.display = 'none';
            document.getElementById('detailStatus').innerHTML = '<div class="empty-state">从左侧结果选择一件专利查看详情。</div>';
            switchInspector('targetPanel');
            if (detailTrigger && typeof detailTrigger.focus === 'function') detailTrigger.focus();
        }

            document.querySelectorAll('.tab').forEach(el => {
                const active = el.dataset.tab === tabId;
                el.classList.toggle('active', active);
                el.setAttribute('aria-selected', String(active));
                el.tabIndex = active ? 0 : -1;
            });
            document.querySelectorAll('.tab-content').forEach(el => {
                const active = el.id === tabId;
                el.classList.toggle('active', active);
                el.hidden = !active;
            });
        }

        async function loadCitations() {
            if (!currentDetailId) return;
            switchTab('detailExtra');
            document.getElementById('detailExtra').innerHTML = '<div class="loading">加载引证信息...</div>';
            try {
                const response = await fetch(`${API_BASE}/citations/${encodeURIComponent(currentDetailId)}`);
                const data = await response.json();
                currentExtraData = { type: 'citations', data };
                if (!response.ok) {
                    document.getElementById('detailExtra').innerHTML = `<div class="error">HTTP ${response.status}\n${data.message || JSON.stringify(data)}</div>`;
                    return;
                }
                document.getElementById('detailExtra').innerHTML = `
                    <div class="detail-section"><h4>被引专利 (${data.cited_by ? data.cited_by.length : 0})</h4><pre>${JSON.stringify(data.cited_by || [], null, 2)}</pre></div>
                    <div class="detail-section"><h4>引用专利 (${data.patent_references ? data.patent_references.length : 0})</h4><pre>${JSON.stringify(data.patent_references || [], null, 2)}</pre></div>
                    <div class="detail-section"><h4>非专利引用</h4><pre>${JSON.stringify(data.non_patent_references || [], null, 2)}</pre></div>
                `;
            } catch (err) {
                document.getElementById('detailExtra').innerHTML = `<div class="error">请求失败：${err.message}</div>`;
            }
        }

        async function loadLegalHistory() {
            if (!currentDetailId) return;
            switchTab('detailExtra');
            document.getElementById('detailExtra').innerHTML = '<div class="loading">加载法律历史...</div>';
            try {
                const response = await fetch(`${API_BASE}/legal-history/${encodeURIComponent(currentDetailId)}`);
                const data = await response.json();
                currentExtraData = { type: 'legalHistory', data };
                if (!response.ok) {
                    document.getElementById('detailExtra').innerHTML = `<div class="error">HTTP ${response.status}\n${data.message || JSON.stringify(data)}</div>`;
                    return;
                }
                document.getElementById('detailExtra').innerHTML = `
                    <div class="detail-section"><h4>法律历史 (${data.transactions ? data.transactions.length : 0})</h4><pre>${JSON.stringify(data.transactions || [], null, 2)}</pre></div>
                `;
            } catch (err) {
                document.getElementById('detailExtra').innerHTML = `<div class="error">请求失败：${err.message}</div>`;
            }
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        init();
    </script>
</body>
</html>
