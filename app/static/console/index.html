<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专利检索内部控制台</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --primary: #409eff;
            --primary-hover: #66b1ff;
            --danger: #f56c6c;
            --success: #67c23a;
            --warning: #e6a23c;
            --text: #303133;
            --text-secondary: #606266;
            --border: #dcdfe6;
            --bg: #f5f7fa;
            --card-bg: #fff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* 搜索区 */
        .search-panel {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            overflow-y: auto;
            max-height: 58vh;
        }
        .search-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .search-header h1 {
            margin: 0;
            font-size: 18px;
            color: var(--text);
        }
        .search-header-actions {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 18px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #fff;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
        }
        button:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        button.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        button.primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
        }
        button.small {
            padding: 5px 10px;
            font-size: 12px;
        }
        button.icon {
            width: 28px;
            height: 28px;
            padding: 0;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            line-height: 1;
        }
        button.icon.add {
            border-color: var(--primary);
            color: var(--primary);
        }
        button.icon.add:hover {
            background: var(--primary);
            color: #fff;
        }
        button.icon.remove {
            border-color: var(--danger);
            color: var(--danger);
        }
        button.icon.remove:hover {
            background: var(--danger);
            color: #fff;
        }

        .conditions-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }
        .request-params {
            display: grid;
            grid-template-columns: repeat(6, minmax(120px, 1fr));
            gap: 10px;
            padding: 12px;
            margin-bottom: 14px;
            background: #fafafa;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .request-param label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .condition-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }
        .condition-row:last-child {
            border-bottom: none;
        }
        .condition-label {
            width: 80px;
            font-size: 13px;
            color: var(--text-secondary);
            text-align: right;
            flex-shrink: 0;
        }
        .condition-connector {
            width: 70px;
            flex-shrink: 0;
        }
        .condition-field {
            width: 180px;
            flex-shrink: 0;
        }
        .condition-value {
            flex: 1;
            min-width: 120px;
        }
        .condition-value-pair {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .condition-actions {
            width: 80px;
            display: flex;
            gap: 6px;
            justify-content: flex-end;
            flex-shrink: 0;
        }
        input, select, textarea {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        textarea {
            resize: vertical;
        }
        .hint {
            font-size: 12px;
            color: #909399;
            margin-top: 4px;
        }

        .query-preview {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            background: #fafafa;
        }
        .query-preview label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .query-preview textarea {
            background: #fff;
            min-height: 60px;
            margin-bottom: 8px;
        }
        .query-toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .query-toolbar button {
            padding: 5px 12px;
            font-size: 12px;
        }

        /* 结果区 */
        .results-panel {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }
        .results-header {
            padding: 10px 24px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-secondary);
        }
        .results-header strong {
            color: var(--primary);
            font-size: 14px;
        }
        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
        }
        .record {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .record:hover, .record.active {
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(64, 158, 255, 0.1);
        }
        .record-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .record-meta {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .record-meta span {
            margin-right: 16px;
        }
        .record-abstract {
            margin-top: 8px;
            font-size: 12px;
            color: #555;
            line-height: 1.5;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .record-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }
        .pagination {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* 请求/错误区 */
        .request-panel {
            background: var(--card-bg);
            border-top: 1px solid var(--border);
        }
        .request-header {
            padding: 8px 24px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .request-header:hover {
            background: #f5f7fa;
        }
        .request-body {
            padding: 0 24px 16px;
            max-height: 180px;
            overflow: auto;
        }
        .request-body.collapsed {
            display: none;
        }
        .request-body pre {
            margin: 0;
            background: #f8f8f8;
            padding: 12px;
            border-radius: 4px;
            font-size: 11px;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* 详情抽屉 */
        .backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 99;
            display: none;
        }
        .backdrop.open { display: block; }
        .detail-overlay {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: min(720px, 100vw);
            background: var(--card-bg);
            border-left: 1px solid var(--border);
            box-shadow: -4px 0 16px rgba(0,0,0,0.1);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.2s;
        }
        .detail-overlay.open {
            transform: translateX(0);
        }
        .detail-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .detail-header h3 {
            margin: 0;
            font-size: 16px;
        }
        .detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }
        .detail-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .detail-summary {
            background: #f0f9ff;
            border-left: 4px solid var(--primary);
            padding: 10px 12px;
            margin-bottom: 14px;
            border-radius: 4px;
            font-size: 13px;
        }
        .detail-section {
            margin-bottom: 18px;
        }
        .detail-section h4 {
            margin: 0 0 8px;
            font-size: 13px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }
        .detail-row {
            display: flex;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .detail-label {
            width: 100px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .detail-value {
            flex: 1;
            word-break: break-all;
        }
        .detail-text {
            font-size: 13px;
            line-height: 1.7;
            white-space: pre-wrap;
        }
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .tab {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-size: 13px;
        }
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        pre {
            background: #f8f8f8;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
            border: 1px solid var(--border);
        }
        .error {
            background: #fef0f0;
            color: var(--danger);
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            white-space: pre-wrap;
        }
        .loading {
            color: var(--primary);
            padding: 12px;
            font-size: 13px;
        }

        @media (max-width: 900px) {
            .request-params { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
            .condition-label { display: none; }
            .condition-row { flex-wrap: wrap; }
            .condition-connector { width: 80px; }
            .condition-field { width: 140px; }
            .condition-value { min-width: 100%; }
            .detail-overlay { width: 100vw; }
            .search-panel { padding: 12px; }
            .results-list { padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="search-panel">
            <div class="search-header">
                <h1>高级检索</h1>
                <div class="search-header-actions">
                    <button onclick="clearAllConditions()">清空</button>
                    <button class="primary" onclick="doSearch()">检索</button>
                </div>
            </div>

            <div class="request-params">
                <div class="request-param">
                    <label for="ds">数据范围 ds</label>
                    <select id="ds">
                        <option value="cn" selected>cn（中国）</option>
                        <option value="all">all（全球）</option>
                        <option value="us">us（美国）</option>
                        <option value="jp">jp（日本）</option>
                        <option value="de">de（德国）</option>
                        <option value="ep">ep（欧洲专利局）</option>
                        <option value="wo">wo（WIPO）</option>
                        <option value="kr">kr（韩国）</option>
                        <option value="gb">gb（英国）</option>
                        <option value="fr">fr（法国）</option>
                        <option value="ca">ca（加拿大）</option>
                        <option value="au">au（澳大利亚）</option>
                    </select>
                </div>
                <div class="request-param">
                    <label for="sort">排序 sort</label>
                    <select id="sort">
                        <option value="relation" selected>relation</option>
                        <option value="rank">rank</option>
                        <option value="relevance">relevance</option>
                        <option value="score">score</option>
                        <option value="applicationDate">applicationDate</option>
                        <option value="!applicationDate">!applicationDate</option>
                        <option value="documentDate">documentDate</option>
                        <option value="!documentDate">!documentDate</option>
                    </select>
                </div>
                <div class="request-param">
                    <label for="page">页码 page</label>
                    <input id="page" type="number" value="1" min="1">
                </div>
                <div class="request-param">
                    <label for="pageSize">每页 page_size</label>
                    <input id="pageSize" type="number" value="10" min="1" max="100">
                </div>
                <div class="request-param">
                    <label for="highlight">高亮 highlight</label>
                    <select id="highlight">
                        <option value="0" selected>0（关闭）</option>
                        <option value="1">1（开启）</option>
                    </select>
                </div>
                <div class="request-param">
                    <label for="indexAnalyzerMode">分析模式</label>
                    <select id="indexAnalyzerMode">
                        <option value="compat" selected>compat</option>
                        <option value="normal">normal</option>
                    </select>
                </div>
            </div>

            <div class="conditions-list" id="conditionsList"></div>

            <div class="query-preview">
                <label>检索式预览（可直接编辑）</label>
                <textarea id="q" rows="2" placeholder="例如：阀门 或 ipc:H02M AND tscd:(均衡)"></textarea>
                <div class="query-toolbar">
                    <button onclick="insertOp('AND')">AND</button>
                    <button onclick="insertOp('OR')">OR</button>
                    <button onclick="insertOp('NOT')">NOT</button>
                    <button onclick="insertOp('(')">(</button>
                    <button onclick="insertOp(')')">)</button>
                    <button onclick="copyQuery()">复制检索式</button>
                </div>
            </div>
        </div>

        <div class="results-panel">
            <div class="results-header">
                <span>当前检索共 <strong id="resultCount">0</strong> 件</span>
            </div>
            <div class="results-list" id="records"></div>
            <div class="pagination" id="pagination"></div>
        </div>

        <div class="request-panel" id="requestPanel" style="display: none;">
            <div class="request-header" onclick="toggleRequestPanel()">
                <span>请求 / 错误信息</span>
                <span id="requestToggle">▼</span>
            </div>
            <div class="request-body" id="requestBody">
                <pre id="requestInfo">暂无请求</pre>
            </div>
        </div>
    </div>

    <div id="backdrop" class="backdrop" onclick="closeDetail()"></div>
    <div id="detailOverlay" class="detail-overlay">
        <div class="detail-header">
            <h3>专利详情</h3>
            <button onclick="closeDetail()">关闭</button>
        </div>
        <div class="detail-body">
            <div id="detailStatus"></div>
            <div id="detailContent" style="display: none;">
                <div class="detail-actions">
                    <button class="small" onclick="copyPatentId()">复制专利 ID</button>
                    <button class="small primary" onclick="loadFullDetail()">查看完整信息（含说明书）</button>
                    <button class="small" onclick="loadCitations()">引证信息</button>
                    <button class="small" onclick="loadLegalHistory()">法律历史</button>
                    <button class="small" onclick="switchTab('detailRaw')">原始 JSON</button>
                </div>
                <div id="detailSummary"></div>
                <div class="tabs">
                    <div class="tab active" data-tab="detailMain" onclick="switchTab('detailMain')">主要信息</div>
                    <div class="tab" data-tab="detailClaims" onclick="switchTab('detailClaims')">权利要求</div>
                    <div class="tab" data-tab="detailExtra" onclick="switchTab('detailExtra')">引证 / 法律历史</div>
                    <div class="tab" data-tab="detailRaw" onclick="switchTab('detailRaw')">原始响应</div>
                </div>
                <div id="detailMain" class="tab-content active"></div>
                <div id="detailClaims" class="tab-content"></div>
                <div id="detailExtra" class="tab-content"></div>
                <div id="detailRaw" class="tab-content"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/console-api';
        let conditions = [];
        let nextConditionId = 1;
        let lastResponse = null;
        let currentDetailId = null;
        let currentDetailData = null;
        let currentExtraData = null;
        let requestCollapsed = false;

        const CATEGORIES = [
            { key: 'keyword', label: '技术关键词', fields: [
                { value: 'tscd', label: '名称/摘要/权利要求' },
                { value: 'title', label: '名称/标题' },
                { value: 'ab', label: '摘要' },
                { value: 'mainClaim', label: '首权' },
                { value: 'claims', label: '权利要求' },
                { value: 'description', label: '说明书' },
                { value: 'keyword', label: '普通关键词' }
            ]},
            { key: 'classification', label: '分类号', fields: [
                { value: 'ipc', label: 'IPC分类号' },
                { value: 'mainIpc', label: '主IPC分类号' }
            ]},
            { key: 'party', label: '相关人', fields: [
                { value: 'applicant', label: '申请人' },
                { value: 'currentAssignee', label: '当前权利人' }
            ]},
            { key: 'agency', label: '代理', fields: [
                { value: 'agency', label: '代理机构' },
                { value: 'agent', label: '代理人' }
            ]},
            { key: 'number', label: '号码', fields: [
                { value: 'applicationNumber', label: '申请号' },
                { value: 'documentNumber', label: '公开(公告)号' },
                { value: 'publicationNumber', label: '公开号' },
                { value: 'patentId', label: '专利ID' }
            ]},
            { key: 'date', label: '日期', fields: [
                { value: 'ad', label: '申请日', type: 'dateRange' },
                { value: 'documentYear', label: '公开年', type: 'yearRange' }
            ]},
            { key: 'status', label: '法律状态', fields: [
                { value: 'legalStatus', label: '专利状态', type: 'enum', options: ['有效专利', '在审', '失效'] }
            ]},
            { key: 'type', label: '类型', fields: [
                { value: 'type', label: '专利类型', type: 'enum', options: ['发明专利', '实用新型', '外观设计'] }
            ]}
        ];

        const DS_OPTIONS = [
            { value: 'cn', label: '中国' },
            { value: 'all', label: '全球' },
            { value: 'us', label: '美国' },
            { value: 'jp', label: '日本' },
            { value: 'de', label: '德国' },
            { value: 'ep', label: '欧洲专利局' },
            { value: 'wo', label: 'WIPO' },
            { value: 'kr', label: '韩国' },
            { value: 'gb', label: '英国' },
            { value: 'fr', label: '法国' },
            { value: 'ca', label: '加拿大' },
            { value: 'au', label: '澳大利亚' }
        ];

        function getCategory(key) {
            return CATEGORIES.find(c => c.key === key) || CATEGORIES[0];
        }

        function getFieldDef(categoryKey, fieldValue) {
            const cat = getCategory(categoryKey);
            return cat.fields.find(f => f.value === fieldValue) || cat.fields[0];
        }

        function createCondition(categoryKey, fieldValue) {
            const cat = getCategory(categoryKey);
            const field = fieldValue ? cat.fields.find(f => f.value === fieldValue) || cat.fields[0] : cat.fields[0];
            return {
                id: `cond-${nextConditionId++}`,
                connector: conditions.length === 0 ? 'and' : 'and',
                category: cat.key,
                field: field.value,
                value: '',
                start: '',
                end: ''
            };
        }

        function init() {
            conditions = [createCondition('keyword', 'tscd')];
            renderConditions();
            updateQueryPreview();
            loadState();
        }

        function renderConditions() {
            const container = document.getElementById('conditionsList');
            container.innerHTML = conditions.map((cond, index) => renderConditionRow(cond, index)).join('');
        }

        function renderConditionRow(cond, index) {
            const cat = getCategory(cond.category);
            const field = getFieldDef(cond.category, cond.field);
            return `
                <div class="condition-row" data-id="${cond.id}">
                    <div class="condition-label">${cat.label}</div>
                    <div class="condition-connector">
                        <select onchange="updateCondition('${cond.id}', 'connector', this.value)">
                            ${renderOptions(['and', 'or', 'not'], cond.connector, v => ({ value: v, label: v }))}
                        </select>
                    </div>
                    <div class="condition-field">
                        <select onchange="changeConditionField('${cond.id}', this.value)">
                            ${cat.fields.map(f => `<option value="${escapeHtml(f.value)}" ${f.value === cond.field ? 'selected' : ''}>${escapeHtml(f.label)}</option>`).join('')}
                        </select>
                    </div>
                    ${renderConditionValue(cond, field)}
                    <div class="condition-actions">
                        <button class="icon add" title="添加同类型条件" onclick="addCondition('${cond.category}', '${cond.field}')">+</button>
                        ${conditions.length > 1 ? `<button class="icon remove" title="删除" onclick="removeCondition('${cond.id}')">×</button>` : ''}
                    </div>
                </div>
            `;
        }

        function renderConditionValue(cond, field) {
            if (field.type === 'dateRange') {
                return `
                    <div class="condition-value-pair">
                        <input type="date" placeholder="开始" value="${escapeHtml(cond.start || '')}" onchange="updateCondition('${cond.id}', 'start', this.value)">
                        <span>-</span>
                        <input type="date" placeholder="结束" value="${escapeHtml(cond.end || '')}" onchange="updateCondition('${cond.id}', 'end', this.value)">
                    </div>
                `;
            }
            if (field.type === 'yearRange') {
                return `
                    <div class="condition-value-pair">
                        <input type="number" min="1900" max="2100" placeholder="开始年" value="${escapeHtml(cond.start || '')}" onchange="updateCondition('${cond.id}', 'start', this.value)">
                        <span>-</span>
                        <input type="number" min="1900" max="2100" placeholder="结束年" value="${escapeHtml(cond.end || '')}" onchange="updateCondition('${cond.id}', 'end', this.value)">
                    </div>
                `;
            }
            if (field.type === 'enum') {
                return `
                    <div class="condition-value">
                        <select onchange="updateCondition('${cond.id}', 'value', this.value)">
                            ${field.options.map(opt => `<option value="${escapeHtml(opt)}" ${opt === cond.value ? 'selected' : ''}>${escapeHtml(opt)}</option>`).join('')}
                        </select>
                    </div>
                `;
            }
            const placeholder = field.value === 'ipc' ? '例如：H02M' :
                field.value === 'mainIpc' ? '例如：H02M' :
                field.value === 'applicationNumber' ? 'CN202411108082.1' :
                field.value === 'documentNumber' ? 'CN119188170B' :
                field.value === 'publicationNumber' ? 'CN119188170B' :
                field.value === 'patentId' ? 'cn-xxx' :
                field.value === 'agency' ? '北京风雅颂专利代理有限公司' :
                field.value === 'agent' ? '张三' :
                field.value === 'keyword' ? '无人机 AND 航拍' : '例如：格力';
            return `
                <div class="condition-value">
                    <input type="text" value="${escapeHtml(cond.value || '')}" placeholder="${escapeHtml(placeholder)}" oninput="updateCondition('${cond.id}', 'value', this.value)">
                </div>
            `;
        }

        function renderOptions(values, selected, mapper) {
            return values.map(v => {
                const item = mapper(v);
                return `<option value="${escapeHtml(item.value)}" ${item.value === selected ? 'selected' : ''}>${escapeHtml(item.label)}</option>`;
            }).join('');
        }

        function addCondition(categoryKey, fieldValue) {
            conditions.push(createCondition(categoryKey, fieldValue));
            renderConditions();
            updateQueryPreview();
        }

        function removeCondition(id) {
            if (conditions.length <= 1) return;
            conditions = conditions.filter(c => c.id !== id);
            renderConditions();
            updateQueryPreview();
        }

        function changeConditionField(id, fieldValue) {
            const cond = conditions.find(c => c.id === id);
            if (!cond) return;
            cond.field = fieldValue;
            cond.value = '';
            cond.start = '';
            cond.end = '';
            renderConditions();
            updateQueryPreview();
        }

        function updateCondition(id, key, value) {
            const cond = conditions.find(c => c.id === id);
            if (!cond) return;
            cond[key] = value;
            updateQueryPreview();
        }

        function clearAllConditions() {
            conditions = [createCondition('keyword', 'tscd')];
            conditions[0].value = '';
            document.getElementById('q').value = '';
            renderConditions();
            updateQueryPreview();
            clearResults();
        }

        function buildQueryClause(cond) {
            const field = getFieldDef(cond.category, cond.field);
            if (field.type === 'dateRange') {
                if (!cond.start || !cond.end) return { error: `${field.label}起止日期都必须填写` };
                return { q: `${cond.field}:[${cond.start} TO ${cond.end}]` };
            }
            if (field.type === 'yearRange') {
                if (!/^\d{4}$/.test(cond.start || '') || !/^\d{4}$/.test(cond.end || '')) {
                    return { error: `${field.label}必须是4位年份` };
                }
                return { q: `${cond.field}:[${cond.start} TO ${cond.end}]` };
            }
            if (field.type === 'enum') {
                const value = (cond.value || '').trim();
                if (!value) return { error: `${field.label}不能为空` };
                return { q: `${cond.field}:(${formatTerm(value)})` };
            }
            const value = (cond.value || '').trim();
            if (!value) return { error: `${field.label}不能为空` };
            if (cond.field === 'keyword') {
                return { q: value };
            }
            return { q: `${cond.field}:(${formatTerm(value)})` };
        }

        function formatTerm(value) {
            const escaped = escapeQuery(value);
            if (/\s/.test(escaped) && !/^".*"$/.test(escaped)) {
                return `"${escaped}"`;
            }
            return escaped;
        }

        function escapeQuery(value) {
            return value.replace(/"/g, '\\"');
        }

        function updateQueryPreview() {
            const manual = document.getElementById('q');
            if (document.activeElement === manual) return;
            const result = buildFullQuery();
            if (!result.error) {
                manual.value = result.q;
            }
        }

        function buildFullQuery() {
            const parts = [];
            for (let i = 0; i < conditions.length; i++) {
                const cond = conditions[i];
                const built = buildQueryClause(cond);
                if (built.error) return built;
                if (i === 0) {
                    parts.push(built.q);
                } else {
                    const op = cond.connector === 'not' ? 'AND NOT' : cond.connector.toUpperCase();
                    parts.push(`${op} ${built.q}`);
                }
            }
            return { q: parts.join(' ') };
        }

        function insertOp(op) {
            const el = document.getElementById('q');
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const value = el.value;
            const before = value.substring(0, start);
            const after = value.substring(end);
            const insert = op.length === 1 ? op : ` ${op} `;
            el.value = before + insert + after;
            el.focus();
            el.setSelectionRange(start + insert.length, start + insert.length);
        }

        function getForm() {
            return {
                q: document.getElementById('q').value.trim(),
                ds: document.getElementById('ds').value,
                sort: document.getElementById('sort').value,
                page: parseInt(document.getElementById('page').value, 10) || 1,
                page_size: parseInt(document.getElementById('pageSize').value, 10) || 10,
                highlight: parseInt(document.getElementById('highlight').value, 10) || 0,
                index_analyzer_mode: document.getElementById('indexAnalyzerMode').value
            };
        }

        function saveState() {
            try {
                localStorage.setItem('patentConsole:lastSearch', JSON.stringify({ q: document.getElementById('q').value, response: lastResponse }));
            } catch (e) {}
        }

        function loadState() {
            try {
                const raw = localStorage.getItem('patentConsole:lastSearch');
                if (!raw) return;
                const state = JSON.parse(raw);
                if (state.q !== undefined) document.getElementById('q').value = state.q;
                if (state.response) {
                    lastResponse = state.response;
                    renderResults(state.response);
                }
            } catch (e) {}
        }

        function setRequestInfo(text) {
            const panel = document.getElementById('requestPanel');
            const body = document.getElementById('requestBody');
            document.getElementById('requestInfo').textContent = text;
            panel.style.display = text ? 'block' : 'none';
            body.classList.remove('collapsed');
            document.getElementById('requestToggle').textContent = '▼';
        }

        function toggleRequestPanel() {
            requestCollapsed = !requestCollapsed;
            const body = document.getElementById('requestBody');
            body.classList.toggle('collapsed', requestCollapsed);
            document.getElementById('requestToggle').textContent = requestCollapsed ? '▶' : '▼';
        }

        function clearResults() {
            document.getElementById('resultCount').textContent = '0';
            document.getElementById('records').innerHTML = '';
            document.getElementById('pagination').innerHTML = '';
            lastResponse = null;
        }

        async function doSearch(page) {
            const form = getForm();
            const q = form.q;
            if (!q) {
                setRequestInfo('查询式 q 不能为空');
                return;
            }

            if (page) {
                form.page = page;
                document.getElementById('page').value = page;
            }

            const payload = {
                q,
                ds: form.ds,
                sort: form.sort,
                page: form.page,
                page_size: form.page_size,
                highlight: form.highlight,
                index_analyzer_mode: form.index_analyzer_mode
            };

            try {
                const started = performance.now();
                const response = await fetch(`${API_BASE}/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const elapsed = (performance.now() - started).toFixed(0);

                if (!response.ok) {
                    const message = data.detail || data.message || JSON.stringify(data);
                    setRequestInfo(`POST ${API_BASE}/search\n${JSON.stringify(payload, null, 2)}\n\nHTTP ${response.status} (${elapsed}ms)\n${typeof message === 'object' ? JSON.stringify(message, null, 2) : message}`);
                    return;
                }

                lastResponse = data;
                saveState();
                renderResults(data);
                setRequestInfo(`POST ${API_BASE}/search\n${JSON.stringify(payload, null, 2)}\n\nHTTP ${response.status} (${elapsed}ms)\n${JSON.stringify(data, null, 2).slice(0, 4000)}`);
            } catch (err) {
                setRequestInfo(`POST ${API_BASE}/search\n${JSON.stringify(payload, null, 2)}\n\nError: ${err.message}`);
            }
        }

        function renderResults(data) {
            document.getElementById('resultCount').textContent = data.total || 0;
            const recordsEl = document.getElementById('records');
            if (!data.records || data.records.length === 0) {
                recordsEl.innerHTML = '<div class="empty-state">暂无结果</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            recordsEl.innerHTML = data.records.map((record, index) => `
                <div class="record" onclick="openDetail('${escapeHtml(record.patent_id || '')}')">
                    <div class="record-title">${(data.page - 1) * data.page_size + index + 1}. ${escapeHtml(record.title || '(无标题)')}</div>
                    <div class="record-meta">
                        <span>专利ID: ${escapeHtml(record.patent_id || '')}</span>
                        <span>申请号: ${escapeHtml(record.applicationNumber || '')}</span>
                        <span>公开号: ${escapeHtml(record.documentNumber || '')}</span>
                    </div>
                    <div class="record-meta">
                        <span>申请人: ${escapeHtml(record.applicant || '')}</span>
                        <span>主IPC: ${escapeHtml(record.mainIpc || '')}</span>
                        <span>申请日: ${escapeHtml(record.applicationDate || '')}</span>
                        <span>法律状态: ${escapeHtml(record.legalStatus || '')}</span>
                    </div>
                    <div class="record-abstract">${escapeHtml(record.abstract || '')}</div>
                    <div class="record-actions" onclick="event.stopPropagation()">
                        <button class="small" onclick="copyText('${escapeHtml(record.patent_id || '')}')">复制 ID</button>
                        <button class="small primary" onclick="openDetail('${escapeHtml(record.patent_id || '')}')">查看详情</button>
                    </div>
                </div>
            `).join('');

            renderPagination(data);
        }

        function renderPagination(data) {
            const totalPages = data.total_pages || 0;
            const page = data.page || 1;
            const el = document.getElementById('pagination');
            if (totalPages <= 1) {
                el.innerHTML = '';
                return;
            }
            let html = '';
            if (page > 1) html += `<button onclick="doSearch(${page - 1})">上一页</button>`;
            html += `<span>第 ${page} / ${totalPages} 页</span>`;
            if (page < totalPages) html += `<button onclick="doSearch(${page + 1})">下一页</button>`;
            el.innerHTML = html;
        }

        function copyQuery() {
            copyText(document.getElementById('q').value);
        }

        function copyPatentId() {
            if (currentDetailId) copyText(currentDetailId);
        }

        function copyText(text) {
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制到剪贴板');
            });
        }

        async function openDetail(patentId) {
            if (!patentId) return;
            currentDetailId = patentId;
            currentDetailData = null;
            currentExtraData = null;

            document.getElementById('detailOverlay').classList.add('open');
            document.getElementById('backdrop').classList.add('open');
            document.getElementById('detailContent').style.display = 'none';
            document.getElementById('detailStatus').innerHTML = '<div class="loading">加载详情中...</div>';
            switchTab('detailMain');

            await fetchDetail(patentId, false);
        }

        async function loadFullDetail() {
            if (!currentDetailId) return;
            document.getElementById('detailStatus').innerHTML = '<div class="loading">加载完整信息（含说明书）...</div>';
            await fetchDetail(currentDetailId, true);
        }

        async function fetchDetail(patentId, includeDescription) {
            try {
                const response = await fetch(`${API_BASE}/detail/${encodeURIComponent(patentId)}?include_description=${includeDescription}`);
                const data = await response.json();
                if (!response.ok) {
                    document.getElementById('detailStatus').innerHTML = `<div class="error">HTTP ${response.status}\n${data.message || JSON.stringify(data)}</div>`;
                    return;
                }
                currentDetailData = data;
                renderDetail(data);
                document.getElementById('detailStatus').innerHTML = '';
                document.getElementById('detailContent').style.display = 'block';
            } catch (err) {
                document.getElementById('detailStatus').innerHTML = `<div class="error">请求失败：${err.message}</div>`;
            }
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('open');
            document.getElementById('backdrop').classList.remove('open');
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            const targetTab = document.querySelector(`.tab[data-tab="${tabId}"]`) || event.currentTarget;
            if (targetTab) targetTab.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function renderDetail(data) {
            document.getElementById('detailSummary').innerHTML = `
                <div class="detail-summary">
                    标题：<strong>${escapeHtml(data.title || '')}</strong>
                    申请号：<strong>${escapeHtml(data.applicationNumber || '')}</strong>
                    公开号：<strong>${escapeHtml(data.documentNumber || '')}</strong>
                    ${data.description ? '含说明书：<strong>是</strong>' : ''}
                </div>
            `;

            document.getElementById('detailMain').innerHTML = detailRows([
                ['专利 ID', data.patent_id || data.id || ''],
                ['标题', data.title || ''],
                ['申请号', data.applicationNumber || ''],
                ['公开号', data.documentNumber || ''],
                ['申请日', data.applicationDate || ''],
                ['公开日', data.documentDate || ''],
                ['申请人', data.applicant || ''],
                ['当前权利人', data.currentAssignee || ''],
                ['发明人', data.inventor || ''],
                ['主 IPC', data.mainIpc || data.main_ipc || ''],
                ['IPC 列表', (data.ipcMainList || data.ipc_main_list || []).join('; ')],
                ['法律状态', data.legalStatus || data.legal_status || ''],
                ['当前状态', data.currentStatus || data.current_status || ''],
                ['类型', data.type || '']
            ]);

            document.getElementById('detailClaims').innerHTML = `
                <div class="detail-section">
                    <h4>首权 / 主权利要求</h4>
                    <div class="detail-text">${escapeHtml(data.mainClaim || data.main_claim || '') || '（无）'}</div>
                </div>
                <div class="detail-section">
                    <h4>独立权利要求</h4>
                    <div class="detail-text">${escapeHtml(data.independentClaims || data.independent_claims || '') || '（无）'}</div>
                </div>
                <div class="detail-section">
                    <h4>完整权利要求书</h4>
                    <div class="detail-text">${escapeHtml(data.claims || '') || '（无）'}</div>
                </div>
                ${data.description ? `
                <div class="detail-section">
                    <h4>说明书</h4>
                    <div class="detail-text">${escapeHtml(data.description || '')}</div>
                </div>` : ''}
            `;

            if (!currentExtraData) {
                document.getElementById('detailExtra').innerHTML = '<div class="hint">点击“引证信息”或“法律历史”加载。</div>';
            }
            document.getElementById('detailRaw').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        }

        function detailRows(rows) {
            return rows.map(([label, value]) => `
                <div class="detail-row">
                    <div class="detail-label">${escapeHtml(label)}</div>
                    <div class="detail-value">${escapeHtml(value || '')}</div>
                </div>
            `).join('');
        }

        async function loadCitations() {
            if (!currentDetailId) return;
            switchTab('detailExtra');
            document.getElementById('detailExtra').innerHTML = '<div class="loading">加载引证信息...</div>';
            try {
                const response = await fetch(`${API_BASE}/citations/${encodeURIComponent(currentDetailId)}`);
                const data = await response.json();
                currentExtraData = { type: 'citations', data };
                if (!response.ok) {
                    document.getElementById('detailExtra').innerHTML = `<div class="error">HTTP ${response.status}\n${data.message || JSON.stringify(data)}</div>`;
                    return;
                }
                document.getElementById('detailExtra').innerHTML = `
                    <div class="detail-section"><h4>被引专利 (${data.cited_by ? data.cited_by.length : 0})</h4><pre>${JSON.stringify(data.cited_by || [], null, 2)}</pre></div>
                    <div class="detail-section"><h4>引用专利 (${data.patent_references ? data.patent_references.length : 0})</h4><pre>${JSON.stringify(data.patent_references || [], null, 2)}</pre></div>
                    <div class="detail-section"><h4>非专利引用</h4><pre>${JSON.stringify(data.non_patent_references || [], null, 2)}</pre></div>
                `;
            } catch (err) {
                document.getElementById('detailExtra').innerHTML = `<div class="error">请求失败：${err.message}</div>`;
            }
        }

        async function loadLegalHistory() {
            if (!currentDetailId) return;
            switchTab('detailExtra');
            document.getElementById('detailExtra').innerHTML = '<div class="loading">加载法律历史...</div>';
            try {
                const response = await fetch(`${API_BASE}/legal-history/${encodeURIComponent(currentDetailId)}`);
                const data = await response.json();
                currentExtraData = { type: 'legalHistory', data };
                if (!response.ok) {
                    document.getElementById('detailExtra').innerHTML = `<div class="error">HTTP ${response.status}\n${data.message || JSON.stringify(data)}</div>`;
                    return;
                }
                document.getElementById('detailExtra').innerHTML = `
                    <div class="detail-section"><h4>法律历史 (${data.transactions ? data.transactions.length : 0})</h4><pre>${JSON.stringify(data.transactions || [], null, 2)}</pre></div>
                `;
            } catch (err) {
                document.getElementById('detailExtra').innerHTML = `<div class="error">请求失败：${err.message}</div>`;
            }
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        init();
    </script>
</body>
</html>
